<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Snip — a self-hosted, open-source URL shortener built with SvelteKit, Prisma, and Redis." />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Snip — self-hosted URL shortener" />
    <meta property="og:description" content="Shorten links, track clicks, host on your own infra." />
    <meta property="og:image" content="%sveltekit.assets%/favicon.svg" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Snip — self-hosted URL shortener" />
    <meta name="twitter:description" content="Shorten links, track clicks, host on your own infra." />

    <title>Snip — self-hosted URL shortener</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
